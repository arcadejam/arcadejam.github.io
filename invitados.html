<head>
  <meta charset="UTF-8" />

  <meta name="description"
    content="Jam Attack 3: Jornada de videojuegos indie y programación en Viator. Charlas, presentaciones de proyectos, networking y más. Organizado por Arcade Bits con la colaboración del IES Al-Andalus, La Jaquería y el Ayuntamiento de Viator.">
  <link rel="icon" type="image/png" href="img/faviconjam.png">
  <meta name="keywords"
    content="Jam Attack, videojuegos indie, programación, Viator, evento, charlas, networking, Arcade Bits, IES Al-Andalus, La Jaquería, Heartbyte Studios, Upware Studios, desarrollo de videojuegos, inscripciones, proyectos, Andalucía">
  <title>Jam Attack 3 - 12 de Junio de 2026</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    .font-press-start {
      font-family: 'Press Start 2P', cursive;
    }

    @media (max-width: 767px) {
      section {
        padding-left: 1em;
        padding-right: 1em;
      }
    }
  </style>
</head>

<script>

fetch("invitados.json")
  .then(res => res.json())
  .then(data => {

    const container = document.getElementById("charlas");

    data.invitados.forEach(charla => {

      const autoresHTML = charla.autores.map(autor => `
        <div class="flex gap-4 mt-4">

          <img src="${autor.foto}" 
               class="w-20 h-20 rounded-full object-cover">

          <div>
            <p class="font-semibold">${autor.nombre}</p>
            <p class="text-purple-300 text-sm">${autor.cargo}</p>
            <p class="text-sm text-gray-400">${autor.bio}</p>
          </div>

        </div>
      `).join("");

      const recursosHTML = charla.recursos.map(recurso => `
        <a href="${recurso.url}" 
           class="text-yellow-400 text-right hover:underline block mt-2"
           target="_blank">
           ${recurso.name}
        </a>
      `).join("");

      const section = document.createElement("section");

      section.className =
        "container max-w-5xl mx-auto p-8 md:p-10 mt-8 bg-gray-900/80 border-t-4 border-[#a64ca6] rounded-3xl shadow-[0_-5px_25px_rgba(166,76,166,0.2)]";

      section.innerHTML = `

        <h2 class="text-xl font-bold text-yellow-400 mb-2">
          ${charla.titulo}
        </h2>

        <p class="text-purple-300 text-right text-sm mb-4">
          ${charla.fecha} · ${charla.horario}
        </p>

        <div class="mb-4">
          ${charla.descripcion}
        </div>

        <h3 class="font-semibold text-left mt-6"><u>Ponentes</u></h3>

        ${autoresHTML}

        <h3 class="font-semibold text-right mt-6">Recursos</h3>

        ${recursosHTML}

      `;

      container.appendChild(section);

    });

});

</script>

  <nav
